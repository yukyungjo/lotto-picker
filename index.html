<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행운 로또 자동 번호 뽑기</title>
  <meta name="theme-color" content="#ffd54a">
  <style>
    :root{
      --bg1:#fff4bf; --bg2:#d8fff1; --card:#ffffff; --text:#222; --muted:#777;
      --line:#ececec; --accent:#ff9f1c; --accent2:#ff5d73; --paper:#fffaf0;
      --shadow:0 18px 48px rgba(0,0,0,.16);
    }
    body.dark{
      --bg1:#151515; --bg2:#2a2140; --card:#202026; --text:#f5f5f5; --muted:#b8b8b8;
      --line:#393940; --paper:#282831; --shadow:0 18px 48px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      min-height:100vh;
      background:radial-gradient(circle at 20% 20%, rgba(255,255,255,.65), transparent 28%),linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      padding:18px;
    }
    .app{max-width:520px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}
    h1{font-size:26px;margin:0;letter-spacing:-.5px}
    .toggle{width:auto;border:0;border-radius:999px;padding:10px 13px;background:var(--card);color:var(--text);box-shadow:0 5px 15px rgba(0,0,0,.08);font-weight:800}
    .machine{background:linear-gradient(180deg,#ffcc4d,#ff8f1f);border-radius:34px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .machine:before{content:"";position:absolute;inset:-60px auto auto -50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.25)}
    .window{height:210px;background:rgba(255,255,255,.9);border:7px solid rgba(255,255,255,.55);border-radius:28px;position:relative;overflow:hidden;margin-bottom:15px;box-shadow:inset 0 0 26px rgba(0,0,0,.15)}
    body.dark .window{background:#18181d}
    .float-ball{position:absolute;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;box-shadow:inset -5px -7px 10px rgba(0,0,0,.2),0 6px 12px rgba(0,0,0,.18);animation:roll 2.2s linear infinite;user-select:none}
    @keyframes roll{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(28px,-18px) rotate(130deg)}50%{transform:translate(-18px,22px) rotate(260deg)}75%{transform:translate(20px,15px) rotate(390deg)}100%{transform:translate(0,0) rotate(520deg)}}
    .slot{min-height:54px;background:rgba(255,255,255,.58);border-radius:20px;padding:8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
    .ball{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;box-shadow:inset -5px -7px 10px rgba(0,0,0,.22),0 6px 12px rgba(0,0,0,.18);animation:pop .38s cubic-bezier(.2,1.4,.5,1)}
    @keyframes pop{from{transform:scale(0) translateY(-20px);opacity:0}to{transform:scale(1);opacity:1}}
    .controls{background:var(--card);border-radius:28px;padding:16px;margin-top:16px;box-shadow:var(--shadow)}
    button{border:0;border-radius:999px;padding:14px 16px;font-size:16px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .draw{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:18px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .soft{background:#f1f1f1;color:#222}
    body.dark .soft{background:#34343d;color:#fff}
    .paper{margin-top:16px;background:var(--paper);border-radius:20px;border:2px dashed #f2c66b;padding:14px;box-shadow:0 8px 18px rgba(0,0,0,.08)}
    .paper-title{font-weight:900;margin-bottom:9px;display:flex;justify-content:space-between}
    .game-line{display:grid;grid-template-columns:36px 1fr;align-items:center;border-top:1px solid var(--line);padding:9px 0;font-size:14px}
    .game-line:first-of-type{border-top:0}
    .label{font-weight:900;color:var(--accent2)}
    .line-balls{display:flex;gap:6px;flex-wrap:wrap}
    .mini{width:31px;height:31px;font-size:13px}
    .panel{background:var(--card);border-radius:24px;padding:14px;margin-top:14px;box-shadow:0 10px 24px rgba(0,0,0,.09)}
    .panel h2{font-size:17px;margin:0 0 10px}
    textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:16px;background:transparent;color:var(--text);padding:12px;font-size:15px;resize:vertical}
    .hint{color:var(--muted);font-size:12px;line-height:1.45;margin-top:8px}
    .stats{display:flex;gap:6px;flex-wrap:wrap}
    .stat{min-width:42px;padding:8px;border-radius:12px;background:rgba(255,159,28,.13);text-align:center;font-weight:900}
    .history{max-height:180px;overflow:auto;font-size:13px;line-height:1.7;color:var(--muted)}
    .msg{text-align:center;font-weight:900;min-height:22px;color:var(--accent2);margin-top:10px}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>🎰 행운 로또 자동</h1>
      <button class="toggle" onclick="toggleDark()">🌙 다크</button>
    </div>

    <section class="machine">
      <div class="window" id="machineWindow"></div>
      <div class="slot" id="currentSlot"></div>
    </section>

    <section class="controls">
      <button class="draw" onclick="drawAll()">🍀 5줄 자동 뽑기</button>
      <div class="row">
        <button class="soft" onclick="drawAll()">🔄 다시 뽑기</button>
        <button class="soft" onclick="copyNumbers()">📋 번호 복사</button>
      </div>
      <div class="msg" id="message">오늘의 행운을 뽑아보세요 ✨</div>
    </section>

    <section class="paper">
      <div class="paper-title"><span>🎨 LOTTO 6/45 자동 용지</span><span>5게임</span></div>
      <div id="paperLines"></div>
    </section>

    <section class="panel">
      <h2>⭐ 꽝 번호 제외 옵션</h2>
      <textarea id="excludeInput" placeholder="제외하고 싶은 번호를 입력하세요. 예: 4, 13, 22"></textarea>
      <div class="hint">1~45 숫자만 적용돼요. 너무 많이 제외하면 최소 6개 번호는 남겨야 해요.</div>
    </section>

    <section class="panel">
      <h2>📊 많이 나온 번호 통계</h2>
      <div class="stats" id="statsBox"></div>
      <div class="hint">최근 저장 기록 기준 상위 번호를 보여줘요.</div>
    </section>

    <section class="panel">
      <h2>💾 최근 저장 기록 100회</h2>
      <div class="history" id="historyBox"></div>
      <div class="row">
        <button class="soft" onclick="clearHistory()">기록 삭제</button>
        <button class="soft" onclick="copyHistory()">기록 복사</button>
      </div>
    </section>

    <div class="hint" style="text-align:center;margin:16px 0 24px">📱 아이폰 홈화면 추가: Safari에서 열기 → 공유 버튼 → 홈 화면에 추가</div>
  </div>

<script>
const win = document.getElementById("machineWindow");
const slot = document.getElementById("currentSlot");
const paper = document.getElementById("paperLines");
const msg = document.getElementById("message");
const statsBox = document.getElementById("statsBox");
const historyBox = document.getElementById("historyBox");
let current = [];
let history = JSON.parse(localStorage.getItem("lottoHistory") || "[]");

function ballColor(n){
  if(n<=10) return "#f6b800";
  if(n<=20) return "#4aa3df";
  if(n<=30) return "#ff6f61";
  if(n<=40) return "#6f6f78";
  return "#76c943";
}
function parseExclude(){
  const raw = document.getElementById("excludeInput").value;
  return raw.split(/[^0-9]+/).map(Number).filter(n=>n>=1 && n<=45);
}
function oneLine(){
  const ex = [...new Set(parseExclude())];
  const pool = [];
  for(let i=1;i<=45;i++) if(!ex.includes(i)) pool.push(i);
  const nums = [];
  while(nums.length < 6 && pool.length){
    const idx = Math.floor(Math.random()*pool.length);
    nums.push(pool.splice(idx,1)[0]);
  }
  return nums.sort((a,b)=>a-b);
}
function makeBall(n, mini=false){
  const b = document.createElement("div");
  b.className = mini ? "ball mini" : "ball";
  b.style.background = ballColor(n);
  b.textContent = n;
  return b;
}
function setupMachine(){
  win.innerHTML = "";
  for(let i=0;i<22;i++){
    const n = Math.floor(Math.random()*45)+1;
    const b = document.createElement("div");
    b.className = "float-ball";
    b.style.background = ballColor(n);
    b.textContent = n;
    b.style.left = Math.random()*82 + "%";
    b.style.top = Math.random()*75 + "%";
    b.style.animationDelay = (Math.random()*-2) + "s";
    b.style.animationDuration = (1.4 + Math.random()*1.8) + "s";
    win.appendChild(b);
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function drawAll(){
  const possible = 45 - new Set(parseExclude()).size;
  if(possible < 6){ alert("제외 번호가 너무 많아요. 최소 6개 번호는 남겨주세요."); return; }

  current = [];
  paper.innerHTML = "";
  slot.innerHTML = "";
  msg.textContent = "공이 굴러가는 중... 🎰";
  setupMachine();

  for(let line=0; line<5; line++){
    const nums = oneLine();
    current.push(nums);
    slot.innerHTML = "";

    for(let i=0;i<nums.length;i++){
      await sleep(230);
      slot.appendChild(makeBall(nums[i]));
    }
    addPaperLine(line+1, nums);
  }

  saveHistory(current);
  renderStats();
  renderHistory();
  const messages = ["🍀 행운의 5줄 완성!","✨ 오늘 느낌 좋은데요?","🎱 자동 번호 생성 완료!","🌈 행운 가득 담았어요!"];
  msg.textContent = messages[Math.floor(Math.random()*messages.length)];
}
function addPaperLine(idx, nums){
  const row = document.createElement("div");
  row.className = "game-line";
  const label = document.createElement("div");
  label.className = "label";
  label.textContent = idx+"번";
  const balls = document.createElement("div");
  balls.className = "line-balls";
  nums.forEach(n=>balls.appendChild(makeBall(n,true)));
  row.appendChild(label);
  row.appendChild(balls);
  paper.appendChild(row);
}
function saveHistory(lines){
  const stamp = new Date().toLocaleString("ko-KR");
  history.unshift({time:stamp, lines:lines});
  history = history.slice(0,100);
  localStorage.setItem("lottoHistory", JSON.stringify(history));
}
async function copyNumbers(){
  if(!current.length){ alert("먼저 번호를 뽑아주세요!"); return; }
  const text = current.map((v,i)=>`${i+1}번: ${v.join(", ")}`).join("\n");
  await navigator.clipboard.writeText(text);
  msg.textContent = "📋 번호 복사 완료!";
}
async function copyHistory(){
  if(!history.length){ alert("저장된 기록이 없어요."); return; }
  const text = history.map(h => `[${h.time}]\n` + h.lines.map((v,i)=>`${i+1}번: ${v.join(", ")}`).join("\n")).join("\n\n");
  await navigator.clipboard.writeText(text);
  msg.textContent = "💾 기록 복사 완료!";
}
function renderStats(){
  const count = {};
  history.forEach(h => h.lines.flat().forEach(n => count[n]=(count[n]||0)+1));
  const top = Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,12);
  statsBox.innerHTML = "";
  if(!top.length){ statsBox.innerHTML = '<span class="hint">아직 기록이 없어요.</span>'; return; }
  top.forEach(([n,c])=>{
    const s = document.createElement("div");
    s.className = "stat";
    s.innerHTML = `<div>${n}</div><small>${c}회</small>`;
    statsBox.appendChild(s);
  });
}
function renderHistory(){
  if(!history.length){ historyBox.textContent = "아직 저장 기록이 없어요."; return; }
  historyBox.innerHTML = history.map((h,idx)=>
    `<b>${idx+1}. ${h.time}</b><br>` + h.lines.map((v,i)=>`${i+1}번: ${v.join(", ")}`).join("<br>")
  ).join("<hr>");
}
function clearHistory(){
  if(confirm("최근 저장 기록을 모두 삭제할까요?")){
    history = [];
    localStorage.removeItem("lottoHistory");
    renderStats(); renderHistory();
    msg.textContent = "기록을 삭제했어요.";
  }
}
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("lottoDark", document.body.classList.contains("dark") ? "1" : "0");
}
if(localStorage.getItem("lottoDark")==="1") document.body.classList.add("dark");
setupMachine();
renderStats();
renderHistory();
</script>
</body>
</html>
